# 우리 저장소용 CI — 생성 프로젝트에 배달되는 modules/ci 와는 별개다.
name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src/scaffold/engine --cov-fail-under=70
