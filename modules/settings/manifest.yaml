name: settings
description: pydantic-settings 기반 환경설정 (.env 로딩)
category: config
depends_on: []
files:
  - src: files/src/core/config.py
    dest: src/core/config.py
  - src: files/tests/test_settings.py
    dest: tests/test_settings.py
pip_packages:
  - pydantic-settings>=2.2
env_vars:
  - name: APP_ENV
    default: development
    description: 실행 환경 (development / production)
routers: []
docker_services: {}
